<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data:;
    " />
    <link href="../build/output.css" rel="stylesheet" />
    <link href="../styles.css" rel="stylesheet" />
    <title>Notification</title>
    <style>
      /* Window-specific styles for notification window */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div class="notification-container">
      <div class="notification-card" id="notificationCard">
        <div class="notification-header">
          <div class="notification-content">
            <div class="notification-brand-row">
              <div class="notification-icon">
                <img src="../resources/icon.svg" alt="DoneThat" />
              </div>
              <div class="notification-brand-name">DoneThat</div>
            </div>
            <div class="notification-title" id="notificationTitle"></div>
            <div class="notification-message-row">
              <div class="notification-message" id="notificationMessage"></div>
              <button class="notification-action-btn hidden" id="notificationActionBtn"></button>
            </div>
          </div>
          <button class="notification-close-btn" id="notificationCloseBtn" aria-label="Close notification">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </div>
    </div>
    <script src="./notification.js"></script>
  </body>
</html>
