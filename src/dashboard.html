<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Ensure proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP Meta Tags allowing Firebase connections -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self';
        connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
      "
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self';
        connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
      "
    />
    <title>Dashboard</title>
    <!-- Local Tailwind CSS -->
    <link href="../build/output.css" rel="stylesheet" />
  </head>
  <body class="bg-gray-100 flex flex-col h-screen">
    <!-- Top Section: Icon -->
    <header class="p-4">
      <img src="../assets/icon.png" alt="App Icon" class="h-12 mx-auto" />
    </header>

    <!-- Middle Section: Placeholder Content -->
    <main class="flex-grow flex items-center justify-center">
      <div class="text-center">
        <h2 class="text-2xl font-bold mb-4">Welcome to the Dashboard!</h2>
        <p class="text-gray-600">Placeholder content goes here.</p>
      </div>
    </main>

    <!-- Bottom Section: Logout Link -->
    <footer class="p-4">
      <div class="text-center">
        <a href="#" id="logoutLink" class="text-blue-500 hover:underline text-sm">Logout</a>
      </div>
    </footer>

    <!-- External script for dashboard functionality -->
    <script type="module" src="./dashboard.js"></script>
  </body>
</html>
