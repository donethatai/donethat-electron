<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Ensure proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP Meta Tags -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
    ">
    <meta http-equiv="X-Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
    ">
    <title>Sign In</title>
    <!-- Local Tailwind CSS -->
    <link href="./build/output.css" rel="stylesheet" />
    
  </head>
  <body class="bg-white relative overflow-hidden">
    <!-- Playful decorative element -->
    <div class="absolute -top-16 -right-16 w-64 h-64 bg-purple-200 rounded-full opacity-70 blur-3xl"></div>
    
    <div class="max-w-md mx-auto mt-20 p-8 bg-white border border-black rounded-lg shadow-xl relative z-10">
      <h1 class="text-3xl font-bold text-center text-black mb-6">Sign In</h1>
      <p id="auth-status" class="mb-4 text-center text-black">
        Checking authentication status...
      </p>
      <form id="signInForm" class="space-y-5">
        <div>
          <label for="signInEmail" class="block text-black font-semibold">
            Email:
          </label>
          <input
            type="email"
            id="signInEmail"
            required
            class="w-full border border-black p-3 rounded focus:outline-none focus:ring-2 focus:ring-purple-500 transition duration-200"
          />
        </div>
        <div>
          <label for="signInPassword" class="block text-black font-semibold">
            Password:
          </label>
          <input
            type="password"
            id="signInPassword"
            required
            class="w-full border border-black p-3 rounded focus:outline-none focus:ring-2 focus:ring-purple-500 transition duration-200"
          />
        </div>
        <div>
          <input
            type="submit"
            value="Sign In"
            class="w-full bg-purple-500 text-white p-3 rounded cursor-pointer hover:bg-purple-600 transition duration-200 shadow-md"
          />
        </div>
      </form>
      <div class="mt-6 flex justify-between text-sm">
        <a href="signup.html" class="text-purple-500 hover:underline">Sign Up</a>
        <a href="reset.html" class="text-purple-500 hover:underline"
          >Forgot Password?</a
        >
      </div>
    </div>
  
    <!-- Reference the external JavaScript file -->
    <script type="module" src="./index.js"></script>
  </body>
</html>
