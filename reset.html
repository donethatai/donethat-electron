<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Ensure proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP Meta Tags -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
    ">
    <meta http-equiv="X-Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
    ">
    <title>Password Reset</title>
    <!-- Local Tailwind CSS -->
    <link href="./build/output.css" rel="stylesheet" />
  </head>
  <body class="bg-white relative overflow-hidden">
    <!-- Playful decorative element -->
    <div class="absolute -top-16 -right-16 w-64 h-64 bg-purple-200 rounded-full opacity-70 blur-3xl"></div>

    <div class="max-w-md mx-auto mt-20 p-8 bg-white border border-black rounded-lg shadow-xl relative z-10">
      <h1 class="text-3xl font-bold text-center text-black mb-6">Password Reset</h1>
      <form id="resetForm" class="space-y-5">
        <div>
          <label for="resetEmail" class="block text-black font-semibold">Email:</label>
          <input
            type="email"
            id="resetEmail"
            required
            class="w-full border border-black p-3 rounded focus:outline-none focus:ring-2 focus:ring-purple-500 transition duration-200"
          />
        </div>
        <div>
          <input
            type="submit"
            value="Reset Password"
            class="w-full bg-purple-500 text-white p-3 rounded cursor-pointer hover:bg-purple-600 transition duration-200 shadow-md"
          />
        </div>
      </form>
      <div class="mt-6 text-center">
        <a href="index.html" class="text-purple-500 hover:underline">Back to Sign In</a>
      </div>
    </div>

    <!-- External script for reset functionality -->
    <script type="module" src="./reset.js"></script>
  </body>
</html>
